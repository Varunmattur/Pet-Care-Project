<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCareEHR - Login</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>🐾 PetCareEHR</h1>
            <p>Secure Pet Health Records Management</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('owner')">Pet Owner</button>
            <button class="tab-btn" onclick="switchTab('adopter')">Adopter/Shelter</button>
            <button class="tab-btn" onclick="switchTab('vet')">Veterinarian</button>
        </div>

        <!-- OWNER -->
        <div id="owner-tab" class="tab-content active">
            <div class="form-toggle">
                <button class="toggle-btn active" onclick="toggleForm('owner', 'login')">Login</button>
                <button class="toggle-btn" onclick="toggleForm('owner', 'signup')">Sign Up</button>
            </div>
            <form id="owner-login-form" class="auth-form active" onsubmit="ownerLogin(event)">
                <h2>Owner Login</h2>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="owner-login-msg"></p>
            </form>
            <form id="owner-signup-form" class="auth-form" onsubmit="ownerSignup(event)">
                <h2>Create Owner Account</h2>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
                <input type="text" placeholder="Address" required>
                <input type="text" placeholder="Location (City)" required>
                <input type="password" placeholder="Password (min 6)" required>
                <button type="submit">Sign Up</button>
                <p id="owner-signup-msg"></p>
            </form>
        </div>

        <!-- ADOPTER -->
        <div id="adopter-tab" class="tab-content">
            <div class="form-toggle">
                <button class="toggle-btn active" onclick="toggleForm('adopter', 'login')">Login</button>
                <button class="toggle-btn" onclick="toggleForm('adopter', 'signup')">Sign Up</button>
            </div>
            <form id="adopter-login-form" class="auth-form active" onsubmit="adopterLogin(event)">
                <h2>Adopter Login</h2>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="adopter-login-msg"></p>
            </form>
            <form id="adopter-signup-form" class="auth-form" onsubmit="adopterSignup(event)">
                <h2>Create Adopter Account</h2>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
                <input type="text" placeholder="Address" required>
                <input type="text" placeholder="Agency Name" required>
                <input type="text" placeholder="Location (City)" required>
                <input type="password" placeholder="Password (min 6)" required>
                <button type="submit">Sign Up</button>
                <p id="adopter-signup-msg"></p>
            </form>
        </div>

        <!-- VET -->
        <div id="vet-tab" class="tab-content">
            <form id="vet-login-form" class="auth-form active" onsubmit="vetLogin(event)">
                <h2>Veterinarian Login</h2>
                <p class="info-text">Pre-registered veterinarians only</p>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p id="vet-login-msg"></p>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
